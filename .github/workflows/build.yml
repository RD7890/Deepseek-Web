name: Build Deepseek-Web APK

on:
  push:
    branches: [ "main", "dev", "release/**" ]
    paths-ignore: [ '**.md' ]
  pull_request:
    branches: [ "main" ]
    paths-ignore: [ '**.md' ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TG_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Deepseek-Web APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Telegram — Build started ─────────────────────────────────────────
      - name: Telegram — Build started
        if: env.TG_BOT_TOKEN != ''
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="$(printf '🔨 *Deepseek-Web — Build Started*\n\n📌 Branch: \`%s\`\n🔢 Build: #%s\n📝 Commit: \`%s\`' \
              '${{ github.ref_name }}' '${{ github.run_number }}' "$SHORT_SHA")"

      # ── 2. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 3. JDK 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Gradle cache ──────────────────────────────────────────────────────
      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 5. Restore signing keystore ──────────────────────────────────────────
      - name: Restore signing keystore
        run: |
          mkdir -p signing
          if [ -f signing/signing-key.jks ]; then
            echo "Using committed keystore: $(wc -c < signing/signing-key.jks) bytes"
          elif [ -n "${{ secrets.SIGNING_KEYSTORE_B64 }}" ]; then
            echo "Using SIGNING_KEYSTORE_B64 secret"
            echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > signing/signing-key.jks
            echo "Keystore restored: $(wc -c < signing/signing-key.jks) bytes"
          else
            echo "⚠️  No keystore found — generating fresh one"
            keytool -genkeypair \
              -alias deepseek -keypass deepseek123 \
              -keystore signing/signing-key.jks \
              -storepass deepseek123 \
              -dname "CN=DeepseekWeb,OU=Dev,O=Rohan,L=India,S=India,C=IN" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storetype PKCS12 -noprompt
          fi

      # ── 6. local.properties ──────────────────────────────────────────────────
      - name: Create local.properties
        run: |
          printf 'signing.storeFile=signing/signing-key.jks\nsigning.storePassword=deepseek123\nsigning.keyAlias=deepseek\nsigning.keyPassword=deepseek123\n' \
            > local.properties

      # ── 7. chmod gradlew ─────────────────────────────────────────────────────
      - name: chmod gradlew
        run: chmod +x ./gradlew

      # ── 8. Auto version bump ─────────────────────────────────────────────────
      - name: Bump version
        run: |
          BUILD=${{ github.run_number }}
          VER_NAME="1.0.${BUILD}"
          sed -i "s/versionCode = [0-9]*/versionCode = ${BUILD}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${VER_NAME}\"/" app/build.gradle.kts
          echo "versionCode → ${BUILD}"
          echo "versionName → ${VER_NAME}"

      # ── 9. Assemble Release APK ───────────────────────────────────────────────
      - name: Assemble Release APK
        run: |
          set -o pipefail
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      # ── 10. Version info ─────────────────────────────────────────────────────
      - name: Get version info
        id: version
        run: |
          VER=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"' | head -1)
          echo "name=$VER"           >> $GITHUB_OUTPUT
          echo "apk_name=DeepseekWeb-v${VER}.apk" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      # ── 11. Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"

      # ── 12. Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: app/build/outputs/apk/release/DeepseekWeb-*.apk
          retention-days: 90

      # ── 13. GitHub Release (main / release/** only) ───────────────────────────
      - name: Create GitHub Release
        if: >
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build.${{ github.run_number }}
          name: "Deepseek-Web v${{ steps.version.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            **Deepseek-Web v${{ steps.version.outputs.name }} — Automated Release**

            Branch: `${{ github.ref_name }}` | Commit: `${{ github.sha }}`
            Package: `com.rohan.deepseek`

            **Features:**
            - WebView wrapper for chat.deepseek.com
            - Smart static asset caching (images, CSS, JS, fonts cached locally)
            - Cache Manager — view, delete individual assets, refresh all
            - Smooth Jetpack Compose UI — dark/light theme follows system

            **Install:** Download APK → enable "Install from unknown sources" → install.
          draft: false
          prerelease: true
          files: app/build/outputs/apk/release/DeepseekWeb-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 14. Telegram — SUCCESS ────────────────────────────────────────────────
      - name: Telegram — Success
        if: success() && env.TG_BOT_TOKEN != ''
        run: |
          RELEASE_URL="https://github.com/RD7890/Deepseek-Web/releases/tag/v${{ steps.version.outputs.name }}-build.${{ github.run_number }}"
          ARTIFACT_URL="https://github.com/RD7890/Deepseek-Web/actions/runs/${{ github.run_id }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          APK_SIZE=$(du -sh app/build/outputs/apk/release/*.apk 2>/dev/null | awk '{print $1}' | head -1 || echo "?")
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="$(printf '✅ *Deepseek-Web v%s Build #%s — SUCCESS*\n\n📦 APK: \`%s\` (%s)\n🌿 Branch: \`%s\`\n🔖 Commit: \`%s\`\n\n🔗 [Download APK](%s)' \
              '${{ steps.version.outputs.name }}' '${{ github.run_number }}' \
              '${{ steps.version.outputs.apk_name }}' "$APK_SIZE" \
              '${{ github.ref_name }}' "$SHORT_SHA" "$RELEASE_URL")"
          tail -200 build.log > build_summary.log
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F document=@build_summary.log \
            -F caption="📋 Deepseek-Web Build #${{ github.run_number }} — last 200 lines"

      # ── 15. Telegram — FAILURE ────────────────────────────────────────────────
      - name: Telegram — Failure
        if: failure() && env.TG_BOT_TOKEN != ''
        run: |
          ACTIONS_URL="https://github.com/RD7890/Deepseek-Web/actions/runs/${{ github.run_id }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="Markdown" \
            -d text="$(printf '❌ *Deepseek-Web Build #%s — FAILED*\n\n🌿 Branch: \`%s\`\n🔖 Commit: \`%s\`\n\n🔍 [View logs](%s)' \
              '${{ github.run_number }}' '${{ github.ref_name }}' "$SHORT_SHA" "$ACTIONS_URL")"
          if [ -f build.log ]; then tail -200 build.log > fail_log.txt
          else echo "Build failed before Gradle step" > fail_log.txt; fi
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" \
            -F document=@fail_log.txt \
            -F caption="💥 Deepseek-Web failure log — Build #${{ github.run_number }}"
